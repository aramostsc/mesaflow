services:
  postgres:
    image: postgres:16-alpine
    container_name: mesaflow-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mesaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mesaflow_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-mesaflow}
      MESAFLOW_TEST_DATABASE: ${MESAFLOW_TEST_DATABASE:-mesaflow_test}
    volumes:
      - mesaflow_postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  mesaflow_postgres_data:
